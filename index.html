<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TakutoOokawa | Art Director / Interaction Designer</title>
  <meta name="description" content="大川大空翔 — アートディレクター / インタラクションデザイナー。デザインを通じた実装とコミットメントを目的として活動。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+2:wght@200;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="nav">
    <button class="theme-toggle" type="button" aria-label="カラーテーマ切り替え">
      <span class="theme-toggle__icon"></span>
    </button>
  </nav>

  <!-- Hero -->
  <header class="hero">
    <h1 class="hero__name" id="hero-name"></h1>
    <p class="hero__name-ja" id="hero-name-ja"></p>
    <p class="hero__title" id="hero-title"></p>
  </header>

  <main>

    <!-- About -->
    <section class="section" id="about">
      <h2 class="section__heading">About</h2>
      <div class="section__body section__body--narrow">
        <div class="about__ja" id="about-ja"></div>
        <div class="about__en" id="about-en"></div>
      </div>
    </section>

    <!-- Works -->
    <section class="section" id="works">
      <h2 class="section__heading">Works</h2>
      <div class="section__body">
        <ul class="works" id="works-list"></ul>
      </div>
    </section>

    <!-- Career -->
    <section class="section" id="career">
      <h2 class="section__heading">Career</h2>
      <div class="section__body section__body--narrow">
        <dl class="career" id="career-list"></dl>
      </div>
    </section>

    <!-- Note -->
    <section class="section" id="note">
      <h2 class="section__heading">Note</h2>
      <div class="section__body section__body--narrow">
        <a id="note-link" class="text-link" target="_blank" rel="noopener noreferrer"></a>
      </div>
    </section>

    <!-- Contact -->
    <section class="section" id="contact">
      <h2 class="section__heading">Contact</h2>
      <div class="section__body section__body--narrow">
        <ul class="contact" id="contact-list"></ul>
      </div>
    </section>

  </main>

  <footer class="footer">
    <p>&copy; 2026 TakutoOokawa</p>
  </footer>

  <script src="main.js"></script>
</body>
</html>
